name: MealMajor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./src/frontend

      # Run lint
      - name: Run lint
        run: npm run lint
        working-directory: ./src/frontend

      # Run tests
      - name: Run tests
        run: npm test -- --ci --watchAll=false
        working-directory: ./src/frontend